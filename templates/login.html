{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="center-page">
    <div class="row justify-content-center w-100">
    <section class="col-md-6 col-lg-5">
        <div class="card auth-card p-4">
            <header class="auth-header pb-2 mb-4">
                <h1 class="h3 mb-0">Login</h1>
            </header>
            <form method="post" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="login_value" class="form-label">Username or email</label>
                    <input class="form-control" type="text" id="login_value" name="login_value" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input class="form-control" type="password" id="password" name="password" required minlength="6">
                </div>
                <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
            <p class="mt-3 mb-0 text-center">No account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
        </div>
    </section>
    </div>
</div>
{% endblock %}
